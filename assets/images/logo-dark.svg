<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="100%" height="100%">
  <!-- Icon Symbol (Dambulla Tiger Rock Landscape Symbol) -->
  <g transform="translate(10, 0)">
    <!-- Rising Sun (Sunrise Gold) -->
    <circle cx="45" cy="40" r="22" fill="#F4C430" opacity="0.85" />
    
    <!-- Left Mountain Peak (Small Peak) -->
    <path d="M10,65 L25,45 L40,65 Z" fill="#2C332C" />
    
    <!-- Right Mountain Peak (Large Peak with Plain/Flat Top) -->
    <path d="M30,65 L48,38 L60,38 L75,65 Z" fill="#2C332C" />
    
    <!-- Tiger Silhouette (Standing on the flat right peak) -->
    <path d="M52,38 L52,35 C52,34.5 52.5,34 53,34 L56,34 C56.5,34 57,34.5 57,35 L57,38 L56,38 L56,36 L55,36 L55,38 L53.5,38 L53.5,36 L53,36 L53,38 Z" fill="#2C332C" />
    <path d="M51.5,35.5 C51,35 50.5,35 50,35.5" stroke="#2C332C" stroke-width="1" fill="none" />
    
    <!-- Stairway Climb (Winding through the rocks) -->
    <path d="M34,71 L38,67 L35,63 L40,59 L37,55 L42,51 L39,47 L44,43" stroke="#F4C430" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />

    <!-- Two A-Frame Cabanas Below -->
    <!-- Left Cabana -->
    <polygon points="20,65 16,73 24,73" fill="#2C332C" />
    <polygon points="20,68 18.5,73 21.5,73" fill="#EAEBE8" />
    
    <!-- Right Cabana -->
    <polygon points="65,65 61,73 69,73" fill="#2C332C" />
    <polygon points="65,68 63.5,73 66.5,73" fill="#EAEBE8" />
  </g>

  <!-- Typography (Forest Green #2C332C) -->
  <g transform="translate(105, 0)">
    <!-- Brand Name (Serif style stacked) -->
    <text x="0" y="26" font-family="'Poppins', 'Inter', sans-serif" font-size="10" font-weight="500" fill="#2C332C" opacity="0.8" letter-spacing="4.5">Dambulla</text>
    <text x="0" y="51" font-family="'Playfair Display', 'Didot', 'Garamond', 'Georgia', serif" font-size="22" font-weight="600" fill="#2C332C" letter-spacing="2.5">TIGER ROCK</text>
    <!-- Subtitle (Sans-serif) -->
    <text x="0" y="67" font-family="'Poppins', 'Inter', sans-serif" font-size="8" font-weight="500" fill="#2C332C" opacity="0.6" letter-spacing="4">CALM MOUNTAIN ESCAPE</text>
  </g>
</svg>
